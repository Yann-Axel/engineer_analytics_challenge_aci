version: 2

# 10 KPIs aligned with Part 1.
# The atomic "m_*" measures referenced below are declared in
# _semantic_models.yml (under the `measures:` block of each entity).
# Ratio metrics reference simple m_* metrics so that dbt can compose them
# without re-deriving the SQL.

metrics:

  # ─── Atomic helpers (used by the ratio / derived KPIs below) ────────

  - name: m_revenue
    label: "Revenue (USD)"
    type: simple
    type_params: { measure: total_revenue }

  - name: m_margin
    label: "Flight margin (USD)"
    type: simple
    type_params: { measure: total_margin }

  - name: m_pax
    label: "Passenger count"
    type: simple
    type_params: { measure: pax_count }

  - name: m_seat_capacity
    label: "Seat capacity"
    type: simple
    type_params: { measure: seat_capacity_sum }

  - name: m_flights_scheduled
    label: "Flights scheduled"
    type: simple
    type_params: { measure: flights_scheduled }

  - name: m_flights_operated
    label: "Flights operated"
    type: simple
    type_params: { measure: flights_operated }

  - name: m_flights_cancelled
    label: "Flights cancelled"
    type: simple
    type_params: { measure: flights_cancelled }

  - name: m_flights_on_time
    label: "Flights on time (≤15 min)"
    type: simple
    type_params: { measure: flights_on_time }

  - name: m_bookings
    label: "Bookings"
    type: simple
    type_params: { measure: bookings_count }

  - name: m_unique_customers
    label: "Unique customers"
    type: simple
    type_params: { measure: unique_customers }

  - name: m_bookings_with_ancillary
    label: "Bookings with ancillary"
    type: simple
    type_params: { measure: bookings_with_ancillary }

  # ─── The 10 business KPIs of Part 1 ─────────────────────────────────

  - name: route_revenue
    label: "Route Revenue"
    description: "SUM(ticket_price + ancillary_revenue) on Flown bookings, attributable to a route."
    type: simple
    type_params: { measure: total_revenue }
    filter: "{{ Dimension('flight__flight_status') }} <> 'Cancelled'"

  - name: route_margin_pct
    label: "Route Margin %"
    description: "(Revenue − Direct Operating Cost) / Revenue."
    type: ratio
    type_params:
      numerator:   m_margin
      denominator: m_revenue

  - name: load_factor
    label: "Load Factor"
    description: "Passengers carried / seat capacity available."
    type: ratio
    type_params:
      numerator:   m_pax
      denominator: m_seat_capacity

  - name: delay_rate
    label: "Delay Rate (>15 min)"
    description: "Share of operated flights with departure delay > 15 minutes."
    type: derived
    type_params:
      expr: "1 - (m_flights_on_time / nullif(m_flights_operated, 0))"
      metrics:
        - name: m_flights_on_time
        - name: m_flights_operated

  - name: cancellation_rate
    label: "Cancellation Rate"
    description: "Cancelled flights / scheduled flights."
    type: ratio
    type_params:
      numerator:   m_flights_cancelled
      denominator: m_flights_scheduled

  - name: repeat_booking_rate
    label: "Repeat Booking Rate"
    description: "(bookings − unique customers) / bookings."
    type: derived
    type_params:
      expr: "(m_bookings - m_unique_customers) / nullif(m_bookings, 0)"
      metrics:
        - name: m_bookings
        - name: m_unique_customers

  - name: ancillary_attach_rate
    label: "Ancillary Attach Rate"
    description: "Bookings with ancillary > 0 / total bookings."
    type: ratio
    type_params:
      numerator:   m_bookings_with_ancillary
      denominator: m_bookings

  - name: loyalty_engagement
    label: "Loyalty Engagement"
    description: "Total loyalty points earned in the period."
    type: simple
    type_params: { measure: points_earned_total }

  - name: customer_sentiment
    label: "Customer Sentiment"
    description: "Mean NLP-derived sentiment score, range [-1, +1]."
    type: simple
    type_params: { measure: avg_sentiment_score }

  - name: customer_count
    label: "Customer Count (unique)"
    description: "Count of distinct customers active in the period. The customer-grain Recency (RFM-R) KPI lives in the int_customer_rfm intermediate model."
    type: simple
    type_params: { measure: unique_customers }
